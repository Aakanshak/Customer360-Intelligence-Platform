services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-customer360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-customer360_dev}
      POSTGRES_DB: ${POSTGRES_DB:-customer360}
    ports:
      - "5432:5432"
    volumes:
      - customer360_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer360 -d customer360"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-customer360}:${POSTGRES_PASSWORD:-customer360_dev}@postgres:5432/${POSTGRES_DB:-customer360}
      API_ENV: production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/artifacts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  customer360_db:
  model_artifacts:
